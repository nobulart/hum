# HUM skill-set manifest
# Conceptual scaffold + v0.2 implementation for the DREAMS (slow-cognition /
# subconscious) agent subsystem. See README.md "Normative target vs executable path".

name: hum
description: >
  DREAMS system: a controlled form of agent slow cognition. Captures unresolved
  observations, behavioural defaults, and speculative links at night; surfaces,
  evaluates, and promotes them only when they demonstrate persistent value.
version: 0.2.0
author: nobulart

# ---- surfacing configuration ----
surfacing:
  budget: 5                 # top-N fragments surfaced per cycle by weight
  always_include:           # types that bypass the budget (mandatory surfacing)
    - WARNING
    - CONTRADICTION
  defer_after: 3            # surface attempts before a non-selected fragment is forgotten
  scoring: evidence_derived # unknown signals score ZERO, not a positive default

# ---- skills ----
skills:
  - name: dreams-capture
    path: skills/dreams-capture
    status: released
    note: >
      Delegates to scripts/capture.py (id generation, validation, atomic append,
      duplicate detection). Safe to lock.

deferred:                   # structure visible; not yet shipped as skills
  - name: dreams-surface
    trigger: 07:00 cron or "surface the dreams"
    status: implemented-as-script
    note: scripts/surface.py is the executable; promote to a skill after v1 stability.
  - name: dreams-promote
    trigger: evaluating a surfaced fragment
    status: pending-v1
    note: promotion stays manual for the first several weeks.

# ---- canonical file layout for a new install ----
files:
  - DREAMS_PROTOCOL.md   # normative spec (the hardened protocol)
  - DREAMS.md            # night accumulation (generated from templates/DREAMS.md)
  - SURFACE.md           # morning surfacing
  - DREAMS_DAY.md        # day processing
  - SUBCONSCIOUS.md      # deep store
  - DREAMS_ARCHIVE.md    # tombstones
  - DREAMS_QUARANTINE.md # invalid fragments (never silently defaulted/erased)
  - BUILD.md             # build log

# Storage decision (resolved 2026-07-16, unchanged in v0.2):
#   Structured state = YAML front matter embedded in each Markdown fragment.
#   NO external JSON or SQLite. Dropped artifact: DREAMS_STATE.json.
